    <div id="chatbot-widget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end">

    <script>
        let pollInterval;
        let chatHistory = [];

        function navigateTo(route) {
            window.location.hash = route;
            renderPage();
        }

        function renderPage() {
            const hash = window.location.hash.slice(1) || 'home';
            const template = document.getElementById(`tpl-${hash}`);
            document.getElementById('app-root').innerHTML = template ? template.innerHTML : '';

            if (pollInterval) clearInterval(pollInterval);

            if (hash === 'dashboard') {
                loadIncidentLogs();
                loadLeadsList();
                pollInterval = setInterval(() => {
                    loadIncidentLogs();
                    loadLeadsList();
                }, 3000);
            }
            window.scrollTo(0, 0);
        }

        // ============================
        // LEAD / CONTACT LOGIC
        // ============================
        async function submitLeadForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-lead');
            btn.innerText = "Saving...";

            const payload = {
                name: document.getElementById('lead-name').value,
                email: document.getElementById('lead-email').value,
                phone: document.getElementById('lead-phone').value,
                role: document.getElementById('lead-role').value,
                message: document.getElementById('lead-message').value
            };

            try {
                await fetch('http://127.0.0.1:5000/api/leads', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // On success, redirect to dashboard automatically (Pseudo Login)
                navigateTo('dashboard');
            } catch (error) {
                alert("Cannot connect to backend. Please make sure app.py is running.");
                btn.innerText = "Submit & Login to Dashboard";
            }
        }

        async function loadLeadsList() {
            const container = document.getElementById('leads-list');
            if (!container) return;

            try {
                const res = await fetch('http://127.0.0.1:5000/api/leads');
                const data = await res.json();

                if (!data.leads || !data.leads.length) {
                    container.innerHTML = '<div class="text-slate-400 text-sm">No registered leads yet.</div>';
                    return;
                }

                container.innerHTML = data.leads.slice().reverse().map(lead => `
                    <div class="glass-panel p-3 rounded-xl border border-white/5">
                        <div class="font-semibold text-white text-sm">${lead.name}</div>
                        <div class="text-xs text-teal-400 mb-1">${lead.role}</div>
                        <div class="text-xs text-slate-400 flex justify-between">
                            <span>${lead.phone}</span>
                            <span>${lead.email}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = '<div class="text-red-400 text-sm">Offline</div>';
            }
        }

        // ============================
        // ML TIMELINE LOGIC
        // ============================
        async function loadIncidentLogs() {
            const container = document.getElementById('incident-list');
            if (!container) return;

            try {
                const res = await fetch('http://127.0.0.1:5000/api/logs');
                const data = await res.json();

                if (!data.logs || !data.logs.length) {
                    container.innerHTML = '<div class="text-slate-400">No incidents yet</div>';
                    return;
                }

                let latest = data.logs[data.logs.length - 1];
                if (latest) {
                    const statusEl = document.getElementById('ai-status');
                    if (statusEl) {
                        if (latest.movement_status === "fall_detected") {
                            statusEl.innerText = "FALL DETECTED";
                            statusEl.className = "text-red-500 text-xl font-bold animate-pulse";
                        } else if (latest.movement_status === "moderate_fall") {
                            statusEl.innerText = "MODERATE FALL";
                            statusEl.className = "text-orange-400 text-xl font-bold";
                        } else {
                            statusEl.innerText = "NORMAL";
                            statusEl.className = "text-green-400 text-xl font-bold";
                        }
                    }
                }

                container.innerHTML = data.logs.slice().reverse().map(log => {
                    let uiLabel = "NORMAL";
                    let textColor = "text-green-400";
                    let borderColor = "border-white/5";

                    if (log.movement_status === "fall_detected") {
                        uiLabel = "🚨 FALL DETECTED"; textColor = "text-red-400"; borderColor = "border-red-500/50";
                    } else if (log.movement_status === "moderate_fall") {
                        uiLabel = "⚠️ MODERATE FALL"; textColor = "text-orange-400"; borderColor = "border-orange-500/50";
                    }

                    return `
                        <div class="glass-panel p-4 rounded-xl ${borderColor}">
                            <div class="flex justify-between">
                                <div class="${textColor} font-bold text-sm">${uiLabel}</div>
                                <div class="text-xs text-slate-400">${log.timestamp}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                container.innerHTML = '<div class="text-red-400">Backend Offline</div>';
            }
        }

        function simulateFallSequence() {
            alert('Run pose_detector.py in your terminal to trigger the real ML demo.');
        }

        // ============================
        // CHATBOT LOGIC
        // ============================
        function toggleChatbot() { document.getElementById('chatbot-window').classList.toggle('hidden'); }

        async function handleChatSubmit(e) {
            e.preventDefault();
            const inputField = document.getElementById('chatbot-input');
            const message = inputField.value.trim();
            if (!message) return;

            inputField.value = '';
            appendChatMessage(message, 'user');
            
            const historyText = chatHistory.slice(0, -1).map(msg => `${msg.role}: ${msg.content}`).join('\n');

            try {
                const response = await fetch('http://127.0.0.1:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, history: historyText })
                });
                
                const data = await response.json();
                if (data.response) appendChatMessage(data.response, 'ai');
                else appendChatMessage("Error connecting to AI core.", 'ai');
            } catch (error) {
                appendChatMessage("Network error. Backend must be running.", 'ai');
            }
        }

        function appendChatMessage(message, sender) {
            const container = document.getElementById('chatbot-messages');
            chatHistory.push({ role: sender === 'user' ? 'User' : 'Assistant', content: message });
            if (chatHistory.length > 6) chatHistory.shift();

            const isAI = sender === 'ai';
            const html = `
                <div class="flex gap-3 ${isAI ? '' : 'flex-row-reverse'} animate-[fadeIn_0.3s_ease-out] mb-4">
                    <div class="w-6 h-6 rounded-full ${isAI ? 'bg-teal-500/20' : 'bg-purple-500/20'} flex items-center justify-center shrink-0 mt-1">
                        <i class="ph-fill ${isAI ? 'ph-robot text-teal-400' : 'ph-user text-purple-400'} text-xs"></i>
                    </div>
                    <div class="${isAI ? 'bg-navy-800 text-slate-300 rounded-tl-sm' : 'bg-teal-500/10 text-teal-100 border-teal-500/20 rounded-tr-sm'} border border-white/5 p-3 rounded-2xl text-xs leading-relaxed max-w-[85%] shadow-sm">
                        ${message.replace(/\n/g, '<br>')}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }

        window.addEventListener('hashchange', renderPage);
        document.addEventListener('DOMContentLoaded', renderPage);
    </script>
</body>
</html>
